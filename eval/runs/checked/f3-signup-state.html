<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup State Machine — Animated Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: #020617;
    min-height: 100vh;
    padding: 2rem;
    color: #e2e8f0;
  }
  .container { max-width: 960px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.4rem; }
  .pulse-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #34d399;
  }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle { color: #64748b; font-size: 0.8rem; margin-bottom: 1.5rem; }
  .diagram-card {
    border: 1px solid #1e293b;
    border-radius: 12px;
    background:
      linear-gradient(#02061700, #02061700),
      repeating-linear-gradient(0deg, #0f1b33 0 0.5px, transparent 0.5px 40px),
      repeating-linear-gradient(90deg, #0f1b33 0 0.5px, transparent 0.5px 40px),
      #030a1c;
    padding: 1.5rem 1rem;
    position: relative;
  }
  .pause-btn {
    position: absolute; top: 12px; right: 12px;
    background: transparent; border: 1px solid #1e293b; color: #64748b;
    border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 11px;
    cursor: pointer;
  }
  .pause-btn:hover { color: #e2e8f0; border-color: #334155; }
  .footer { color: #475569; font-size: 0.7rem; margin-top: 1rem; }

  .flow { stroke-dasharray: 5 5; }
  @media (prefers-reduced-motion: no-preference) {
    .flow { animation: dashmove 0.75s linear infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
  }
  @keyframes dashmove { to { stroke-dashoffset: -10; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  body.paused .flow, body.paused .pulse-dot { animation-play-state: paused; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="pulse-dot"></div>
    <h1>Signup state machine</h1>
  </div>
  <p class="subtitle">Form → validation → account creation → email verification (24h timer, one resend) → active or purged</p>

  <div class="diagram-card">
    <button class="pause-btn" id="pauseBtn" aria-pressed="false">⏸ pause</button>

    <svg id="flowsvg" width="100%" viewBox="0 0 800 1022" role="img">
      <title>Signup state machine animated flow diagram</title>
      <desc>A visitor fills the signup form; validation errors loop back to the form. On success the account is created and a verification email is sent. A 24-hour timer waits for the link click. If clicked, the account is activated, onboarding starts, and the flow ends in ACTIVE. If not clicked, one resend loops back to send the email again; once the resend window expires, the account is purged and the flow ends in PURGED.</desc>
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- ===== LEGEND ===== -->
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">
        <path d="M620 44 H652" stroke="#10b981" stroke-width="1" stroke-dasharray="5 5" fill="none" opacity="0.85"/>
        <text x="660" y="48">transition</text>
        <rect x="620" y="60" width="14" height="14" rx="3" fill="rgba(251,191,36,0.04)" stroke="#fbbf24"/>
        <text x="660" y="71">timer / wait</text>
      </g>

      <!-- ===== CONNECTORS (drawn first: nodes mask their ends) ===== -->
      <g stroke="#10b981" stroke-width="1" opacity="0.85" fill="none">
        <!-- START -> Fill Signup Form -->
        <path class="flow" d="M400 80 V132" marker-end="url(#arrow)"/>
        <!-- Fill Signup Form -> Validate Input -->
        <path class="flow" d="M400 180 V232" marker-end="url(#arrow)"/>
        <!-- Validate Input -- errors --> back to form (side loop, no dot) -->
        <path class="flow" d="M324 258 C264 258 264 158 312 158" marker-end="url(#arrow)"/>
        <!-- Validate Input -- valid --> Create Account -->
        <path class="flow" d="M400 280 V332" marker-end="url(#arrow)"/>
        <!-- Create Account -> Send Verification Email -->
        <path class="flow" d="M400 380 V432" marker-end="url(#arrow)"/>
        <!-- Send Verification Email -> Wait ≤ 24h -->
        <path class="flow" d="M400 480 V532" marker-end="url(#arrow)"/>
        <!-- Wait ≤ 24h -> Link Clicked? -->
        <path class="flow" d="M400 580 V632" marker-end="url(#arrow)"/>
        <!-- Fan-out: Link Clicked? -- clicked --> Activate Account -->
        <path class="flow" d="M400 680 V708 H200 V728" marker-end="url(#arrow)"/>
        <!-- Fan-out: Link Clicked? -- not clicked --> Resend Left? -->
        <path class="flow" d="M400 680 V708 H600 V728" marker-end="url(#arrow)"/>
        <!-- Activate Account -> Start Onboarding -->
        <path class="flow" d="M200 776 V828" marker-end="url(#arrow)"/>
        <!-- Start Onboarding -> ACTIVE -->
        <path class="flow" d="M200 876 V928" marker-end="url(#arrow)"/>
        <!-- Resend Left? -- yes --> loop back to Send Verification Email (no dot) -->
        <path class="flow" d="M667 754 H730 V458 H518" marker-end="url(#arrow)"/>
        <!-- Resend Left? -- window expired --> Purge Account -->
        <path class="flow" d="M600 776 V828" marker-end="url(#arrow)"/>
        <!-- Purge Account -> PURGED -->
        <path class="flow" d="M600 876 V928" marker-end="url(#arrow)"/>
      </g>

      <!-- ===== EDGE LABELS ===== -->
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">
        <text x="250" y="212" text-anchor="middle">errors</text>
        <text x="408" y="310" text-anchor="start">valid</text>
        <text x="192" y="722" text-anchor="end">clicked</text>
        <text x="608" y="722" text-anchor="start">not clicked</text>
        <text x="724" y="610" text-anchor="end">↻ resend ×1</text>
        <text x="608" y="806" text-anchor="start">window expired</text>
      </g>

      <!-- ===== TRAVELING DOTS (path = connector d, staggered begin) ===== -->
      <g fill="#34d399">
        <circle r="3.5" class="dot"><animateMotion dur="1.5s" repeatCount="indefinite" path="M400 82 L400 130"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2.2s" repeatCount="indefinite" path="M400 682 L400 708 L200 708 L200 726"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2.2s" begin="0.7s" repeatCount="indefinite" path="M400 682 L400 708 L600 708 L600 726"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite" path="M200 878 L200 926"/></circle>
      </g>

      <!-- ===== NODES (drawn last, on top) ===== -->
      <g font-family="JetBrains Mono, monospace" text-anchor="middle">
        <!-- START pill -->
        <rect x="340" y="40" width="120" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="400" y="65" fill="#e2e8f0" font-size="13" font-weight="600">START</text>

        <!-- Fill Signup Form -->
        <rect x="316" y="136" width="168" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="163" fill="#e2e8f0" font-size="13" font-weight="500">Fill Signup Form</text>

        <!-- Validate Input (decision) -->
        <rect x="324" y="236" width="152" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981" stroke-dasharray="4 3"/>
        <text x="400" y="263" fill="#e2e8f0" font-size="13" font-weight="500">Validate Input</text>

        <!-- Create Account -->
        <rect x="324" y="336" width="152" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="363" fill="#e2e8f0" font-size="13" font-weight="500">Create Account</text>

        <!-- Send Verification Email -->
        <rect x="286" y="436" width="228" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="463" fill="#e2e8f0" font-size="13" font-weight="500">Send Verification Email</text>

        <!-- Wait ≤ 24h (timer) -->
        <rect x="320" y="536" width="160" height="44" rx="8" fill="rgba(251,191,36,0.04)" stroke="#fbbf24"/>
        <text x="400" y="555" fill="#e2e8f0" font-size="13" font-weight="500">Wait ≤ 24h</text>
        <text x="400" y="571" fill="#64748b" font-size="10">verification window</text>

        <!-- Link Clicked? (decision) -->
        <rect x="328" y="636" width="144" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981" stroke-dasharray="4 3"/>
        <text x="400" y="663" fill="#e2e8f0" font-size="13" font-weight="500">Link Clicked?</text>

        <!-- Activate Account -->
        <rect x="116" y="732" width="168" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="200" y="759" fill="#e2e8f0" font-size="13" font-weight="500">Activate Account</text>

        <!-- Resend Left? (decision) -->
        <rect x="533" y="732" width="134" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981" stroke-dasharray="4 3"/>
        <text x="600" y="759" fill="#e2e8f0" font-size="13" font-weight="500">Resend Left?</text>

        <!-- Start Onboarding -->
        <rect x="116" y="832" width="168" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="200" y="859" fill="#e2e8f0" font-size="13" font-weight="500">Start Onboarding</text>

        <!-- Purge Account -->
        <rect x="528" y="832" width="144" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="600" y="859" fill="#e2e8f0" font-size="13" font-weight="500">Purge Account</text>

        <!-- ACTIVE pill -->
        <rect x="140" y="932" width="120" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="200" y="957" fill="#e2e8f0" font-size="13" font-weight="600">ACTIVE</text>

        <!-- PURGED pill -->
        <rect x="540" y="932" width="120" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="600" y="957" fill="#e2e8f0" font-size="13" font-weight="600">PURGED</text>
      </g>
    </svg>
  </div>

  <p class="footer">Generated 2026-06-11 · dashmotion · flow mode</p>
</div>

<script>
  (function () {
    var svg = document.getElementById('flowsvg');
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('.dot').forEach(function (d) { d.remove(); });
      document.getElementById('pauseBtn').remove();
      return;
    }
    var btn = document.getElementById('pauseBtn');
    var paused = false;
    btn.addEventListener('click', function () {
      paused = !paused;
      document.body.classList.toggle('paused', paused);
      paused ? svg.pauseAnimations() : svg.unpauseAnimations();
      btn.textContent = paused ? '▶ play' : '⏸ pause';
      btn.setAttribute('aria-pressed', String(paused));
    });
  })();
</script>
</body>
</html>
