<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Saga — Animated Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: #020617;
    min-height: 100vh;
    padding: 2rem;
    color: #e2e8f0;
  }
  .container { max-width: 960px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.4rem; }
  .pulse-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #34d399;
  }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle { color: #64748b; font-size: 0.8rem; margin-bottom: 1.5rem; }
  .diagram-card {
    border: 1px solid #1e293b;
    border-radius: 12px;
    background:
      linear-gradient(#02061700, #02061700),
      repeating-linear-gradient(0deg, #0f1b33 0 0.5px, transparent 0.5px 40px),
      repeating-linear-gradient(90deg, #0f1b33 0 0.5px, transparent 0.5px 40px),
      #030a1c;
    padding: 1.5rem 1rem;
    position: relative;
  }
  .pause-btn {
    position: absolute; top: 12px; right: 12px;
    background: transparent; border: 1px solid #1e293b; color: #64748b;
    border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 11px;
    cursor: pointer;
  }
  .pause-btn:hover { color: #e2e8f0; border-color: #334155; }
  .footer { color: #475569; font-size: 0.7rem; margin-top: 1rem; }

  .flow { stroke-dasharray: 5 5; }
  @media (prefers-reduced-motion: no-preference) {
    .flow { animation: dashmove 0.75s linear infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
  }
  @keyframes dashmove { to { stroke-dashoffset: -10; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  body.paused .flow, body.paused .pulse-dot { animation-play-state: paused; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="pulse-dot"></div>
    <h1>Order saga workflow</h1>
  </div>
  <p class="subtitle">Order intake → parallel payment &amp; inventory → fraud-review wait → flagged/clean decision with a one-time manual-review loop → ship → parallel email &amp; analytics</p>

  <div class="diagram-card">
    <button class="pause-btn" id="pauseBtn" aria-pressed="false">⏸ pause</button>

    <svg id="flowsvg" width="100%" viewBox="0 0 800 822" role="img">
      <title>Order saga animated workflow diagram</title>
      <desc>An order is submitted, payment validation and inventory reservation run in parallel, both merge into a fraud-review wait timer, a decision routes flagged orders to manual review which can loop back to the timer once while clean orders proceed to shipping, then a confirmation email and analytics update run in parallel before END. Dashed connectors animate in the direction of execution.</desc>
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- ===== CONNECTORS (drawn first: nodes mask their ends) ===== -->
      <g stroke="#10b981" stroke-width="1" opacity="0.85" fill="none">
        <!-- START -> Submit Order -->
        <path class="flow" d="M400 92 V144" marker-end="url(#arrow)"/>
        <!-- Submit Order fan-out: Validate Payment | Reserve Inventory -->
        <path class="flow" d="M400 192 V220 H250 V240" marker-end="url(#arrow)"/>
        <path class="flow" d="M400 192 V220 H550 V240" marker-end="url(#arrow)"/>
        <!-- Fan-in merge into Fraud-Review Timer (arrowhead on one path only) -->
        <path class="flow" d="M250 288 V316 H400 V336" marker-end="url(#arrow)"/>
        <path class="flow" d="M550 288 V316 H400 V336"/>
        <!-- Timer -> Decision -->
        <path class="flow" d="M400 384 V436" marker-end="url(#arrow)"/>
        <!-- Decision -> Manual Review (flagged) -->
        <path class="flow" d="M463 462 H556" marker-end="url(#arrow)"/>
        <!-- Manual Review loop back to Timer (once) — dashed, no dot -->
        <path class="flow" d="M632 440 C632 402 596 362 497 362" marker-end="url(#arrow)"/>
        <!-- Decision -> Ship Order (clean) -->
        <path class="flow" d="M400 484 V536" marker-end="url(#arrow)"/>
        <!-- Ship Order fan-out: Confirmation Email | Update Analytics -->
        <path class="flow" d="M400 584 V612 H250 V632" marker-end="url(#arrow)"/>
        <path class="flow" d="M400 584 V612 H550 V632" marker-end="url(#arrow)"/>
        <!-- Fan-in merge into END (arrowhead on one path only) -->
        <path class="flow" d="M250 680 V708 H400 V728" marker-end="url(#arrow)"/>
        <path class="flow" d="M550 680 V708 H400 V728"/>
      </g>

      <!-- ===== TRAVELING DOTS (path = connector d, staggered begin) ===== -->
      <g fill="#34d399">
        <circle r="3.5" class="dot"><animateMotion dur="1.5s" repeatCount="indefinite" path="M400 92 V144"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2.2s" repeatCount="indefinite" path="M400 192 V220 H250 V240"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2.2s" begin="0.7s" repeatCount="indefinite" path="M400 192 V220 H550 V240"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2s" repeatCount="indefinite" path="M400 584 V612 H250 V632"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M400 584 V612 H550 V632"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2s" begin="0.5s" repeatCount="indefinite" path="M250 680 V708 H400 V728"/></circle>
      </g>

      <!-- ===== NODES (drawn last, on top) ===== -->
      <g font-family="JetBrains Mono, monospace" text-anchor="middle">
        <!-- START pill -->
        <rect x="340" y="52" width="120" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="400" y="77" fill="#e2e8f0" font-size="13" font-weight="600">START</text>

        <!-- Submit Order -->
        <rect x="333" y="148" width="134" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="175" fill="#e2e8f0" font-size="13" font-weight="500">Submit Order</text>

        <!-- Parallel: Validate Payment | Reserve Inventory -->
        <rect x="166" y="244" width="168" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="250" y="271" fill="#e2e8f0" font-size="13" font-weight="500">Validate Payment</text>

        <rect x="461" y="244" width="178" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="550" y="271" fill="#e2e8f0" font-size="13" font-weight="500">Reserve Inventory</text>

        <!-- Fraud-Review Timer (wait, amber) -->
        <rect x="307" y="340" width="186" height="44" rx="8" fill="rgba(251,191,36,0.04)" stroke="#fbbf24"/>
        <text x="400" y="358" fill="#e2e8f0" font-size="13" font-weight="500">Fraud-Review Timer</text>
        <text x="400" y="372" fill="#64748b" font-size="10">⏱ wait window</text>

        <!-- Decision: Fraud Check -->
        <rect x="337" y="440" width="126" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981" stroke-dasharray="4 3"/>
        <text x="400" y="467" fill="#e2e8f0" font-size="13" font-weight="500">Fraud Check</text>

        <!-- Manual Review -->
        <rect x="560" y="440" width="144" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="632" y="467" fill="#e2e8f0" font-size="13" font-weight="500">Manual Review</text>

        <!-- Branch labels -->
        <text x="510" y="454" fill="#64748b" font-size="10">flagged</text>
        <text x="410" y="516" fill="#64748b" font-size="10" text-anchor="start">clean</text>
        <text x="646" y="406" fill="#64748b" font-size="10" text-anchor="start">↻ once</text>

        <!-- Ship Order -->
        <rect x="341" y="540" width="118" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="567" fill="#e2e8f0" font-size="13" font-weight="500">Ship Order</text>

        <!-- Parallel: Confirmation Email | Update Analytics -->
        <rect x="157" y="636" width="186" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="250" y="663" fill="#e2e8f0" font-size="13" font-weight="500">Confirmation Email</text>

        <rect x="466" y="636" width="168" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="550" y="663" fill="#e2e8f0" font-size="13" font-weight="500">Update Analytics</text>

        <!-- END pill -->
        <rect x="340" y="732" width="120" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="400" y="757" fill="#e2e8f0" font-size="13" font-weight="600">END</text>
      </g>
    </svg>
  </div>

  <p class="footer">Generated 2026-06-11 · dashmotion · flow mode</p>
</div>

<script>
  (function () {
    var svg = document.getElementById('flowsvg');
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('.dot').forEach(function (d) { d.remove(); });
      document.getElementById('pauseBtn').remove();
      return;
    }
    var btn = document.getElementById('pauseBtn');
    var paused = false;
    btn.addEventListener('click', function () {
      paused = !paused;
      document.body.classList.toggle('paused', paused);
      paused ? svg.pauseAnimations() : svg.unpauseAnimations();
      btn.textContent = paused ? '▶ play' : '⏸ pause';
      btn.setAttribute('aria-pressed', String(paused));
    });
  })();
</script>
</body>
</html>
