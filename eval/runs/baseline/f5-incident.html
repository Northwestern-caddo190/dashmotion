<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Response Runbook — Animated Workflow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;
    background: #020617;
    min-height: 100vh;
    padding: 2rem;
    color: #e2e8f0;
  }
  .container { max-width: 960px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.4rem; }
  .pulse-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #34d399;
  }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle { color: #64748b; font-size: 0.8rem; margin-bottom: 1.5rem; }
  .diagram-card {
    border: 1px solid #1e293b;
    border-radius: 12px;
    background:
      linear-gradient(#02061700, #02061700),
      repeating-linear-gradient(0deg, #0f1b33 0 0.5px, transparent 0.5px 40px),
      repeating-linear-gradient(90deg, #0f1b33 0 0.5px, transparent 0.5px 40px),
      #030a1c;
    padding: 1.5rem 1rem;
    position: relative;
  }
  .pause-btn {
    position: absolute; top: 12px; right: 12px;
    background: transparent; border: 1px solid #1e293b; color: #64748b;
    border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 11px;
    cursor: pointer;
  }
  .pause-btn:hover { color: #e2e8f0; border-color: #334155; }
  .footer { color: #475569; font-size: 0.7rem; margin-top: 1rem; }

  .flow { stroke-dasharray: 5 5; }
  @media (prefers-reduced-motion: no-preference) {
    .flow { animation: dashmove 0.75s linear infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
  }
  @keyframes dashmove { to { stroke-dashoffset: -10; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  body.paused .flow, body.paused .pulse-dot { animation-play-state: paused; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="pulse-dot"></div>
    <h1>incident response runbook</h1>
  </div>
  <p class="subtitle">Alert → triage to P1/P2/P3 → mitigate → verify (loop on failure) → postmortem → close</p>

  <div class="diagram-card">
    <button class="pause-btn" id="pauseBtn" aria-pressed="false">⏸ pause</button>

    <svg id="flowsvg" width="100%" viewBox="0 0 800 830" role="img">
      <title>Incident response runbook animated workflow diagram</title>
      <desc>An alert fires and enters triage, which assigns severity. P1 pages the on-call and opens a war room; P2 creates a ticket for the next business day; P3 is logged only and the flow ends. P1 and P2 merge into mitigation, then the fix is verified — a failed verification loops back to mitigation. Once verified, the postmortem is written and the incident is closed. Dashed connectors animate in the direction of execution.</desc>
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- ===== CONNECTORS (drawn first: nodes mask their ends) ===== -->
      <g stroke="#10b981" stroke-width="1" opacity="0.85" fill="none">
        <!-- Alert fires -> Triage -->
        <path class="flow" d="M400 92 V144" marker-end="url(#arrow)"/>
        <!-- Triage fan-out: rail at 220, branch tops 244 -->
        <path class="flow" d="M400 192 V220 H170 V240" marker-end="url(#arrow)"/>
        <path class="flow" d="M400 192 V240" marker-end="url(#arrow)"/>
        <path class="flow" d="M400 192 V220 H630 V240" marker-end="url(#arrow)"/>
        <!-- P3 -> END -->
        <path class="flow" d="M630 288 V340" marker-end="url(#arrow)"/>
        <!-- Fan-in P1 + P2 -> Mitigation (arrowhead on one path only) -->
        <path class="flow" d="M170 288 V316 H400 V336"/>
        <path class="flow" d="M400 288 V336" marker-end="url(#arrow)"/>
        <!-- Mitigation -> Verify Fix -->
        <path class="flow" d="M400 384 V436" marker-end="url(#arrow)"/>
        <!-- Verify fail loop back to Mitigation (side exit, re-enter above) -->
        <path class="flow" d="M465 462 C540 462 540 362 469 362" marker-end="url(#arrow)"/>
        <!-- Verify pass -> Write Postmortem -->
        <path class="flow" d="M400 484 V536" marker-end="url(#arrow)"/>
        <!-- Write Postmortem -> Close Incident -->
        <path class="flow" d="M400 584 V636" marker-end="url(#arrow)"/>
        <!-- Close Incident -> END -->
        <path class="flow" d="M400 684 V736" marker-end="url(#arrow)"/>
      </g>

      <!-- Branch / decision labels -->
      <g font-family="JetBrains Mono, ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" fill="#64748b" font-size="10">
        <text x="160" y="236" text-anchor="end">P1</text>
        <text x="390" y="216" text-anchor="end">P2</text>
        <text x="640" y="236" text-anchor="start">P3</text>
        <text x="412" y="514" text-anchor="start">pass</text>
        <text x="528" y="416" text-anchor="start">fail ↻</text>
      </g>

      <!-- ===== TRAVELING DOTS (path = connector d, staggered begin) ===== -->
      <g fill="#34d399">
        <circle r="3.5" class="dot"><animateMotion dur="1.5s" repeatCount="indefinite" path="M400 94 L400 142"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2.2s" repeatCount="indefinite" path="M400 194 L400 220 L170 220 L170 238"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2.2s" begin="0.7s" repeatCount="indefinite" path="M400 194 L400 220 L630 220 L630 238"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="2s" begin="0.4s" repeatCount="indefinite" path="M170 290 L170 316 L400 316 L400 334"/></circle>
        <circle r="3.5" class="dot"><animateMotion dur="1.5s" begin="0.9s" repeatCount="indefinite" path="M400 686 L400 734"/></circle>
      </g>

      <!-- ===== NODES (drawn last, on top) ===== -->
      <g font-family="JetBrains Mono, ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" text-anchor="middle">
        <!-- START pill: alert fires -->
        <rect x="335" y="52" width="130" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="400" y="77" fill="#e2e8f0" font-size="13" font-weight="600">ALERT FIRES</text>

        <!-- Triage decision -->
        <rect x="315" y="148" width="170" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981" stroke-dasharray="4 3"/>
        <text x="400" y="175" fill="#e2e8f0" font-size="13" font-weight="500">Triage Severity</text>

        <!-- P1 branch -->
        <rect x="100" y="244" width="140" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="170" y="263" fill="#e2e8f0" font-size="13" font-weight="500">Page On-call</text>
        <text x="170" y="278" fill="#64748b" font-size="10">open war room</text>

        <!-- P2 branch -->
        <rect x="325" y="244" width="150" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="263" fill="#e2e8f0" font-size="13" font-weight="500">Create Ticket</text>
        <text x="400" y="278" fill="#64748b" font-size="10">next business day</text>

        <!-- P3 branch -->
        <rect x="575" y="244" width="110" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="630" y="263" fill="#e2e8f0" font-size="13" font-weight="500">Log Only</text>
        <text x="630" y="278" fill="#64748b" font-size="10">no action</text>

        <!-- P3 END pill -->
        <rect x="575" y="344" width="110" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="630" y="369" fill="#e2e8f0" font-size="13" font-weight="600">END</text>

        <!-- Mitigation -->
        <rect x="335" y="340" width="130" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="359" fill="#e2e8f0" font-size="13" font-weight="500">Mitigation</text>
        <text x="400" y="374" fill="#64748b" font-size="10">contain &amp; fix</text>

        <!-- Verify decision -->
        <rect x="335" y="440" width="130" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981" stroke-dasharray="4 3"/>
        <text x="400" y="467" fill="#e2e8f0" font-size="13" font-weight="500">Verify Fix</text>

        <!-- Write Postmortem -->
        <rect x="315" y="540" width="170" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="567" fill="#e2e8f0" font-size="13" font-weight="500">Write Postmortem</text>

        <!-- Close Incident -->
        <rect x="320" y="640" width="160" height="44" rx="8" fill="rgba(16,185,129,0.04)" stroke="#10b981"/>
        <text x="400" y="667" fill="#e2e8f0" font-size="13" font-weight="500">Close Incident</text>

        <!-- END pill -->
        <rect x="340" y="740" width="120" height="40" rx="20" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5"/>
        <text x="400" y="765" fill="#e2e8f0" font-size="13" font-weight="600">END</text>
      </g>
    </svg>
  </div>

  <p class="footer">Generated 2026-06-11 · dashmotion · flow mode</p>
</div>

<script>
  (function () {
    var svg = document.getElementById('flowsvg');
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('.dot').forEach(function (d) { d.remove(); });
      document.getElementById('pauseBtn').remove();
      return;
    }
    var btn = document.getElementById('pauseBtn');
    var paused = false;
    btn.addEventListener('click', function () {
      paused = !paused;
      document.body.classList.toggle('paused', paused);
      paused ? svg.pauseAnimations() : svg.unpauseAnimations();
      btn.textContent = paused ? '▶ play' : '⏸ pause';
      btn.setAttribute('aria-pressed', String(paused));
    });
  })();
</script>
</body>
</html>
